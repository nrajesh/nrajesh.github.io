name: Deploy Resume to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GIST_URL: ${{ vars.GIST_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Debug & Download
      run: |
        echo "GIST_URL: $GIST_URL"
        curl -L "$GIST_URL" -o resume.json

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Create temp dir & install
      run: |
        mkdir -p temp-resume
        cp resume.json temp-resume/resume.json
        cd temp-resume
        npm init -y
        npm install resume-cli jsonresume-theme-flat jsonresume-theme-elegant --save-dev

    - name: Export themes
      run: |
        cd temp-resume
        npx resume export --theme flat ../index.html
        npx resume export --theme elegant ../resume-elegant.html

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
