name: Deploy Resume to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      GIST_URL: ${{ vars.GIST_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Debug & Download
      run: |
        echo "GIST_URL: $GIST_URL"
        curl -L "$GIST_URL" -o resume.json

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Create temp dir & install
      run: |
        mkdir -p temp-resume
        cp resume.json temp-resume/resume.json
        cd temp-resume
        npm init -y
        npm install resume-cli jsonresume-theme-projects jsonresume-theme-stackoverflow jsonresume-theme-flat jsonresume-theme-elegant jsonresume-theme-paper --save-dev

    - name: Export themes
      run: |
        mkdir -p public
        cd temp-resume
        npx resume export --theme projects ../public/index.html
        npx resume export --theme stackoverflow ../public/resume-stackoverflow.html
        npx resume export --theme flat ../public/resume-flat.html
        npx resume export --theme elegant ../public/resume-elegant.html
        npx resume export --theme paper ../public/resume-paper.html
        cp resume.json ../public/resume.json


    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './public'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
