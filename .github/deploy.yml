name: Deploy Multi-Theme Resume

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GIST_URL: ${{ vars.GIST_URL }}  # Matches YOUR repo variable

    steps:
    - uses: actions/checkout@v4

    - name: Download resume.json
      run: |
        echo "Using GIST_URL: $GIST_URL"
        curl -L "$GIST_URL" -o resume.json

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install resume-cli
      run: npm install -g resume-cli

    - name: Export to index.html (elegant theme)
      run: resume export --theme elegant index.html

    - name: Deploy to Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
